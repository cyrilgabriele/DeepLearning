trainer:
  experiment_name: smoke-chebykan
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-small
  flavor: chebykan
  hidden_widths: [8, 4]
  degree: 3
  params:
    max_epochs: 40
    lr: 0.003
    weight_decay: 0.00001
    batch_size: 256
    sparsity_lambda: 0.0
    l1_weight: 1.0
    entropy_weight: 1.0
