trainer:
  experiment_name: stage-b-chebykan-optimizer
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-base
  flavor: chebykan
  hidden_widths: [128]
  degree: 5
  params:
    max_epochs: 100
    lr: 0.001
    weight_decay: 0.00001
    batch_size: 256
    sparsity_lambda: 0.0
    l1_weight: 1.0
    entropy_weight: 1.0

tune:
  name: stage-b-chebykan-optimizer-tune
  storage: sweeps/stage_b/chebykan/stage-b-chebykan-optimizer-tune.db
  n_trials: 30
  timeout: null
  sampler: tpe
  top_k_candidates: 5
  search_space:
    lr:
      type: log_uniform
      low: 0.0001
      high: 0.01
    weight_decay:
      type: log_uniform
      low: 0.000001
      high: 0.001
