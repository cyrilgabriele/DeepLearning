trainer:
  experiment_name: stage-b-xgboost-optimizer
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: xgboost_paper

model:
  name: xgb
  params:
    n_estimators: 950
    max_depth: 3
    min_child_weight: 1
    learning_rate: 0.1
    subsample: 1.0
    colsample_bytree: 1.0
    reg_alpha: 1.0
    reg_lambda: 1.0

tune:
  name: stage-b-xgboost-optimizer-tune
  storage: sweeps/stage_b/xgboost/stage-b-xgboost-optimizer-tune.db
  n_trials: 30
  timeout: null
  sampler: tpe
  top_k_candidates: 1
  search_space:
    learning_rate:
      type: log_uniform
      low: 0.01
      high: 0.3
    reg_lambda:
      type: log_uniform
      low: 0.1
      high: 10.0
