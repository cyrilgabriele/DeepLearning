trainer:
  experiment_name: stage-c-xgboost-top20
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

# Same preprocessing recipe the sparse ChebyKAN hero uses, restricted to the
# top-20 features chosen by ChebyKAN importance — a direct head-to-head for
# the sparse regime.
preprocessing:
  contract_version: 1
  recipe: kan_paper
  selected_features_path: configs/experiment_stages/stage_c_explanation_package/feature_lists/chebykan_pareto_q0583_top20_features.json

# Same Optuna-best XGBoost hyperparameters as the full-feature run.
model:
  name: xgboost-paper
  params:
    n_estimators: 765
    max_depth: 11
    learning_rate: 0.012836785304264764
    subsample: 0.620710169201981
    colsample_bytree: 0.5071615942406114
    min_child_weight: 8
    reg_alpha: 0.12670481458419444
    reg_lambda: 1.246619007860089
    num_classes: 8
    tree_method: hist
    eval_metric: mlogloss
    refit_full_training: true
