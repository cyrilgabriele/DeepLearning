trainer:
  experiment_name: stage-c-fourierkan-top20-tune
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper
  selected_features_path: configs/experiment_stages/stage_c_explanation_package/feature_lists/fourierkan_pareto_top20_features.json

model:
  name: tabkan-base
  flavor: fourierkan
  hidden_widths: [64, 256, 64]
  use_layernorm: false
  params:
    max_epochs: 100
    grid_size: 8
    lr: 0.003
    weight_decay: 0.00002
    batch_size: 256
    sparsity_lambda: 0.0249
    l1_weight: 1.0
    entropy_weight: 1.0

tune:
  name: stage-c-fourierkan-top20-tune
  storage: sweeps/stage-c-fourierkan-top20-tune.db
  n_trials: 50
  timeout: null
  sampler: tpe
  top_k_candidates: 1
  search_space:
    depth:
      type: int
      low: 1
      high: 3
    width:
      type: categorical
      choices: [32, 64, 128, 256]
    grid_size:
      type: int
      low: 2
      high: 8
    max_epochs:
      type: categorical
      choices: [75, 100, 150, 200]
    lr:
      type: log_uniform
      low: 0.0001
      high: 0.05
    weight_decay:
      type: log_uniform
      low: 0.000001
      high: 0.01
    batch_size:
      type: categorical
      choices: [256, 512, 1024, 2048]
