trainer:
  experiment_name: stage-c-chebykan-interpretable-best
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-base
  flavor: chebykan
  hidden_widths: [16]
  degree: 3
  params:
    max_epochs: 100
    lr: 0.005
    weight_decay: 0.0005
    batch_size: 2048
    sparsity_lambda: 0.005
    l1_weight: 1.0
    entropy_weight: 1.0
