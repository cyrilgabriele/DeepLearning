trainer:
  experiment_name: stage-c-chebykan-best
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-base
  flavor: chebykan
  hidden_widths: [128]
  degree: 5
  params:
    max_epochs: 100
    lr: 0.0008814400571473658
    weight_decay: 0.00009472373311076866
    batch_size: 256
    sparsity_lambda: 0.0
    l1_weight: 1.0
    entropy_weight: 1.0
