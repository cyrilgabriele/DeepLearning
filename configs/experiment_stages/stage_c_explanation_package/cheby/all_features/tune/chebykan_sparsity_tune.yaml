trainer:
  experiment_name: stage-c-chebykan-sparsity
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-base
  flavor: chebykan
  hidden_widths: [128]
  degree: 5
  params:
    max_epochs: 100
    lr: 0.0008814400571473658
    weight_decay: 0.00009472373311076866
    batch_size: 256
    l1_weight: 1.0
    entropy_weight: 1.0

tune:
  name: stage-c-chebykan-sparsity-tune
  storage: sweeps/stage_c/chebykan/all_features/stage-c-chebykan-sparsity-tune.db
  n_trials: 60
  directions: [maximize, maximize]   # QWK, sparsity_ratio
  sampler: tpe
  top_k_candidates: 5
  search_space:
    sparsity_lambda:
      type: log_uniform
      low: 0.001
      high: 0.5
    l1_weight:
      type: log_uniform
      low: 0.1
      high: 10.0
    entropy_weight:
      type: log_uniform
      low: 0.1
      high: 10.0
