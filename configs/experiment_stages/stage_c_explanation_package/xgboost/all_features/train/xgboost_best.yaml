trainer:
  experiment_name: stage-c-xgboost-best
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: xgboost_paper

model:
  name: xgb
  params:
    n_estimators: 950
    max_depth: 3
    learning_rate: 0.08367544058924387
    subsample: 1.0
    colsample_bytree: 1.0
    min_child_weight: 1
    reg_alpha: 1.0
    reg_lambda: 7.25884254519818
