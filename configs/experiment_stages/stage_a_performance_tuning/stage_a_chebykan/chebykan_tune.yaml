trainer:
  experiment_name: stage-a-chebykan
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-base
  flavor: chebykan
  hidden_widths: [128, 128]
  degree: 3
  params:
    max_epochs: 100
    lr: 0.001
    weight_decay: 0.00001
    batch_size: 256
    sparsity_lambda: 0.0
    l1_weight: 1.0
    entropy_weight: 1.0

tune:
  name: stage-a-chebykan-tune
  storage: sweeps/stage_a/chebykan/stage-a-chebykan-tune.db
  n_trials: 50
  timeout: null
  sampler: tpe
  top_k_candidates: 5
  search_space:
    depth:
      type: int
      low: 1
      high: 3
    width:
      type: categorical
      choices: [32, 64, 128, 256]
    degree:
      type: int
      low: 2
      high: 8
