trainer:
  experiment_name: stage-a-xgboost
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: xgboost_paper

model:
  name: xgb
  params:
    n_estimators: 500
    max_depth: 15
    min_child_weight: 1
    learning_rate: 0.1
    subsample: 1.0
    colsample_bytree: 1.0
    reg_alpha: 1.0
    reg_lambda: 1.0

tune:
  name: stage-a-xgboost-tune
  storage: sweeps/stage_a/xgboost/stage-a-xgboost-tune.db
  n_trials: 50
  timeout: null
  sampler: tpe
  top_k_candidates: 1
  search_space:
    n_estimators:
      type: int
      low: 200
      high: 1000
      step: 50
    max_depth:
      type: int
      low: 3
      high: 15
