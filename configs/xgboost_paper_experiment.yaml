trainer:
  experiment_name: xgboost-paper
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  recipe: xgboost_paper

model:
  name: xgboost-paper
  flavor: null
  depth: 1
  width: 1
  degree: 1
  params:
    n_estimators: 500
    max_depth: 15
    min_child_weight: 1
    learning_rate: 0.1
    subsample: 1.0
    colsample_bytree: 1.0
    reg_alpha: 1.0
    reg_lambda: 1.0
    tree_method: hist
    eval_metric: mlogloss
    auto_tune: true
    refit_full_training: true
    seed_trials: [42, 77, 123, 314, 512]
