trainer:
  experiment_name: smoke-kan
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42
preprocessing:
  recipe: kan_paper
model:
  name: tabkan-base
  flavor: chebykan
  depth: 2
  width: 128
  degree: 3
  params: {}

tune:
  name: smoke-kan-chebykan-tune
  storage: sweeps/smoke-kan-chebykan-tune.db
  n_trials: 20
  timeout: null
  sampler: tpe
  search_space:
    depth:
      type: int
      low: 1
      high: 4
    width:
      type: categorical
      choices: [32, 64, 128, 256]
    max_epochs:
      type: int
      low: 50
      high: 200
      step: 25
    sparsity_lambda:
      type: categorical
      choices: [0.0, 0.00001, 0.0001, 0.001, 0.01]
    degree:
      type: int
      low: 2
      high: 8
