trainer:
  experiment_name: kan-fourier-single
  train_csv: data/prudential-life-insurance-assessment/train.csv
  test_csv: data/prudential-life-insurance-assessment/test.csv
  seed: 42

preprocessing:
  contract_version: 1
  recipe: kan_paper

model:
  name: tabkan-base
  flavor: fourierkan
  depth: 3
  width: 256
  params:
    max_epochs: 150

tune:
  name: kan-fourier-single-tune
  storage: sweeps/kan-fourier-single-tune.db
  n_trials: 50
  timeout: null
  sampler: tpe
  top_k_candidates: 5
  search_space:
    depth:
      type: int
      low: 1
      high: 4
    width:
      type: categorical
      choices: [32, 64, 128, 256]
    max_epochs:
      type: int
      low: 50
      high: 200
      step: 25
    sparsity_lambda:
      type: categorical
      choices: [0.0, 0.00001, 0.0001, 0.001, 0.01]
    grid_size:
      type: int
      low: 2
      high: 8
