name: tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest:
    name: pytest (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: data/test_preprocessing.py
            id: data-preprocessing
            path: tests/data/test_preprocessing.py
          - name: data/test_prudential_kan_preprocessor.py
            id: data-prudential-kan-preprocessor
            path: tests/data/test_prudential_kan_preprocessor.py
          - name: data/test_dataset_pipeline.py
            id: data-dataset-pipeline
            path: tests/data/test_dataset_pipeline.py
          - name: models/test_tabkan.py
            id: models-tabkan
            path: tests/models/test_tabkan.py
          - name: training/test_trainer.py
            id: training-trainer
            path: tests/training/test_trainer.py
    steps:
      - uses: actions/checkout@v4

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Export requirements
        run: |
          uv export \
            --frozen \
            --group dev \
            --output .venv/requirements-${{ matrix.id }}.txt

      - name: Install dependencies
        run: |
          uv pip install \
            --python .venv/bin/python \
            --requirements .venv/requirements-${{ matrix.id }}.txt

      - name: Run pytest
        run: .venv/bin/python -m pytest ${{ matrix.path }}
