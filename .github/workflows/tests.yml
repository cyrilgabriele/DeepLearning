name: pipeline-trace

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnostics:
    name: pipeline trace diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Set up uv
        uses: astral-sh/setup-uv@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Export requirements
        run: |
          uv export \
            --frozen \
            --group dev \
            --output-file .venv/requirements.txt

      - name: Install dependencies
        run: |
          uv pip install \
            --python .venv/bin/python \
            --requirement .venv/requirements.txt

      - name: Run pipeline trace diagnostics
        run: .venv/bin/python src/diagnostics/pipeline_trace.py
